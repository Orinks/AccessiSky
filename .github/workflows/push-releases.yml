name: Push releases to WordPress

on:
  workflow_call:
    inputs:
      bust_cache_first:
        description: "Bust WordPress cache before retrying push"
        required: false
        default: false
        type: boolean
    secrets:
      WP_PUSH_TOKEN:
        required: true
      WP_SITE_URL:
        required: true
  workflow_dispatch:
    inputs:
      bust_cache_first:
        description: "Bust WordPress cache before retrying push"
        required: false
        default: false
        type: boolean

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        env:
          WP_TOKEN: ${{ secrets.WP_PUSH_TOKEN }}
          WP_URL: ${{ secrets.WP_SITE_URL }}
        run: |
          test -n "$WP_TOKEN" || { echo "Missing WP_PUSH_TOKEN"; exit 1; }
          test -n "$WP_URL" || { echo "Missing WP_SITE_URL"; exit 1; }

      - name: Push releases to WordPress (single retry)
        env:
          GH_TOKEN: ${{ github.token }}
          WP_TOKEN: ${{ secrets.WP_PUSH_TOKEN }}
          WP_URL: ${{ secrets.WP_SITE_URL }}
          REPO: ${{ github.repository }}
          BUST_CACHE_FIRST: ${{ inputs.bust_cache_first || false }}
        run: |
          set -euo pipefail

          push_attempt() {
            gh api "repos/$REPO/releases/latest" -H "Accept: application/vnd.github+json" > /tmp/latest.json 2>/dev/null || echo "null" > /tmp/latest.json
            gh api "repos/$REPO/releases?per_page=20" -H "Accept: application/vnd.github+json" > /tmp/all.json

            python3 - <<'PYEOF'
            import json, os, urllib.request

            with open('/tmp/latest.json') as f:
                latest = json.load(f)

            with open('/tmp/all.json') as f:
                all_releases = json.load(f)

            payload = json.dumps({
                'repo': os.environ['REPO'],
                'releases': all_releases[:20],
                'latest': latest if isinstance(latest, dict) and latest.get('tag_name') else None,
            }).encode()

            req = urllib.request.Request(
                os.environ['WP_URL'].rstrip('/') + '/wp-json/ogr/v1/push-releases',
                data=payload,
                headers={
                    'Content-Type': 'application/json',
                    'X-OGR-Token': os.environ['WP_TOKEN'],
                },
                method='POST',
            )
            with urllib.request.urlopen(req, timeout=30) as r:
                body = json.load(r)
            print(f"Pushed {body['count']} releases for {body['repo']}")
            PYEOF
          }

          maybe_bust_cache() {
            if [ "$BUST_CACHE_FIRST" != "true" ]; then
              return 0
            fi

            echo "Optional cache nudge enabled. Calling bust-cache endpoint before retry..."
            python3 - <<'PYEOF'
            import json, os, urllib.request

            req = urllib.request.Request(
                os.environ['WP_URL'].rstrip('/') + '/wp-json/ogr/v1/bust-cache',
                data=b'{}',
                headers={
                    'Content-Type': 'application/json',
                    'X-OGR-Token': os.environ['WP_TOKEN'],
                },
                method='POST',
            )
            with urllib.request.urlopen(req, timeout=20) as r:
                body = json.load(r)
            print("Cache nudge response:", body)
            PYEOF
          }

          push_attempt || {
            echo "First push attempt failed."
            maybe_bust_cache || true
            echo "Retrying once in 10s..."
            sleep 10
            push_attempt
          }
