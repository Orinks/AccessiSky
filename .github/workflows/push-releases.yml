name: Push releases to WordPress

on:
  workflow_call:
    inputs:
      bust_cache_first:
        description: "Bust WordPress cache before retrying push"
        required: false
        default: false
        type: boolean
    secrets:
      WP_PUSH_TOKEN:
        required: true
      WP_SITE_URL:
        required: true
  workflow_dispatch:
    inputs:
      bust_cache_first:
        description: "Bust WordPress cache before retrying push"
        required: false
        default: false
        type: boolean

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Validate required secrets
        env:
          WP_TOKEN: ${{ secrets.WP_PUSH_TOKEN }}
          WP_URL: ${{ secrets.WP_SITE_URL }}
        run: |
          set -euo pipefail
          python3 .github/scripts/push_releases.py
